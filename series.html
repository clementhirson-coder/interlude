<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Interlude — Series</title>
<meta name="description" content="A documentary photography series from Interlude by Clément Hirson." />
<meta name="author" content="Clément Hirson" />
<meta name="robots" content="index,follow,max-image-preview:large" />
<meta name="theme-color" content="#0a0a0a" />
<link rel="canonical" href="https://www.lenstraveler.fr/series.html" />

<!-- Open Graph (updated dynamically by JS for each series) -->
<meta property="og:type" content="article" />
<meta property="og:site_name" content="Interlude" />
<meta property="og:title" content="Interlude — Series" />
<meta property="og:description" content="A documentary photography series by Clément Hirson." />
<meta property="og:url" content="https://www.lenstraveler.fr/series.html" />
<meta property="og:image" content="https://www.lenstraveler.fr/uploads/opt/site-1-9-1920.jpg" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Interlude — Series" />
<meta name="twitter:description" content="A documentary photography series by Clément Hirson." />
<meta name="twitter:image" content="https://www.lenstraveler.fr/uploads/opt/site-1-9-1920.jpg" />

<link rel="icon" type="image/svg+xml" href="favicon.svg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@100;200;300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0a0a0a;--bg2:#0f0f0f;
  --fg:#f2efe9;--dim:rgba(242,239,233,.36);--mute:rgba(242,239,233,.14);
  --line:#1c1c1c;--accent:oklch(0.88 0.04 80);
  --sans:"Jost","Helvetica Neue",sans-serif;
  --mono:"DM Mono","Courier New",monospace;
  --pad:clamp(20px,3vw,44px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--fg);font-family:var(--sans);font-weight:300;
  overflow-x:hidden;cursor:none;-webkit-font-smoothing:antialiased;
  opacity:0;transition:opacity .9s}
body.loaded{opacity:1}
@media(pointer:coarse){body{cursor:auto}}
a{color:inherit;text-decoration:none}
img{display:block}
picture{display:contents}

/* grain */
body::before{content:"";position:fixed;inset:0;z-index:400;pointer-events:none;
  opacity:.05;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}

/* cursor */
.cur-dot{position:fixed;width:8px;height:8px;border-radius:50%;
  background:var(--fg);pointer-events:none;z-index:500;
  transform:translate(-50%,-50%);mix-blend-mode:difference;
  transition:width .25s,height .25s,opacity .2s}
.cur-ring{position:fixed;width:34px;height:34px;border-radius:50%;
  border:1px solid rgba(242,239,233,.38);pointer-events:none;z-index:499;
  transform:translate(-50%,-50%);transition:all .35s}
body.chover .cur-dot{width:0;height:0}
body.chover .cur-ring{width:80px;height:80px;border-color:transparent;background:var(--fg);mix-blend-mode:normal}
body.chover .cur-ring::after{opacity:1}
.cur-ring::after{content:"View";position:absolute;inset:0;display:grid;place-items:center;
  font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--bg);opacity:0;transition:opacity .25s}

/* nav */
.nav{position:fixed;inset:0 0 auto 0;z-index:200;
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  padding:20px var(--pad);
  font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;
  background:rgba(10,10,10,.72);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);}
.nav .back{display:flex;align-items:center;gap:10px;color:var(--fg);transition:opacity .3s}
.nav .back:hover{opacity:.6}
.nav .back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5;
  stroke-linecap:round;stroke-linejoin:round;transition:transform .35s}
.nav .back:hover svg{transform:translateX(-4px)}
.nav .brand{font-family:var(--sans);font-weight:200;font-size:18px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg)}
.nav .meta{justify-self:end;color:var(--fg);display:flex;align-items:center;gap:12px}
.nav .meta .series-title{opacity:1}
.nav .meta .count{opacity:.54}

/* ── series header ─────────────────────────── */
.series-header{
  min-height:100svh;position:relative;overflow:hidden;
  display:flex;align-items:flex-end;
}
.sh-cover{position:absolute;inset:0}
.sh-cover img{width:100%;height:100%;object-fit:cover;
  filter:contrast(1.08) saturate(.82) brightness(.52)}
.sh-shade{position:absolute;inset:0;
  background:linear-gradient(to top,rgba(10,10,10,.88) 0%,rgba(10,10,10,.18) 50%,transparent 100%)}
.sh-content{
  position:relative;z-index:2;
  padding:80px var(--pad) 52px;
  width:100%;
  display:flex;align-items:flex-end;justify-content:space-between;gap:32px;
}
.sh-left .sh-num{
  font-family:var(--mono);font-size:9px;letter-spacing:.36em;
  text-transform:uppercase;color:var(--dim);margin-bottom:16px;
}
.sh-left h1{
  font-family:var(--sans);font-weight:100;
  font-size:clamp(72px,12vw,180px);
  line-height:.88;letter-spacing:.1em;text-transform:uppercase;
}
.sh-right{
  font-family:var(--mono);font-size:10px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--dim);
  text-align:right;line-height:1.9;padding-bottom:6px;
}
.sh-right strong{color:var(--fg);font-weight:400}

/* ── meta bar ──────────────────────────────── */
.meta-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px var(--pad);
  border-bottom:1px solid var(--line);
  font-family:var(--mono);font-size:9px;letter-spacing:.24em;text-transform:uppercase;
  color:var(--dim);
}
.meta-bar .prog{display:flex;align-items:center;gap:10px}
.meta-bar .prog-track{width:80px;height:1px;background:var(--line)}
.meta-bar .prog-fill{height:1px;background:var(--fg);transition:width .6s}

/* ── gallery grid ──────────────────────────── */
.gallery{
  padding:3px var(--pad) 120px;
  columns:3;column-gap:3px;
}
.gitem{
  break-inside:avoid;margin-bottom:3px;
  position:relative;overflow:hidden;cursor:none;
  background:var(--bg2);
}
.gitem img{
  width:100%;display:block;
  filter:contrast(1.04) brightness(.9) saturate(.88);
  transition:transform 1.6s cubic-bezier(.22,.61,.36,1),filter .8s;
}
.gitem:hover img{transform:scale(1.03);filter:contrast(1.06) brightness(.96) saturate(.95)}

.gitem-cap{
  position:absolute;inset:auto 0 0 0;
  padding:36px 14px 12px;
  background:linear-gradient(to top,rgba(0,0,0,.78),transparent);
  display:flex;justify-content:space-between;align-items:flex-end;
  opacity:0;transform:translateY(5px);
  transition:opacity .45s,transform .45s;
}
.gitem:hover .gitem-cap{opacity:1;transform:none}
.gitem-cap .place{font-family:var(--sans);font-weight:200;font-size:14px;color:#fff}
.gitem-cap .code{font-family:var(--mono);font-size:8px;letter-spacing:.26em;
  text-transform:uppercase;color:rgba(255,255,255,.6)}

/* reveal */
.gitem{opacity:0;transform:translateY(18px);
  transition:opacity 1s cubic-bezier(.22,.61,.36,1),transform 1s cubic-bezier(.22,.61,.36,1)}
.gitem.in{opacity:1;transform:none}

/* ── lightbox ──────────────────────────────── */
.lb{
  position:fixed;inset:0;z-index:600;
  background:rgba(8,8,8,.97);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
}
.lb.open{display:flex}
.lb-img{max-width:90vw;max-height:85vh;object-fit:contain;
  filter:contrast(1.04) brightness(.96)}
.lb-ctrl{
  position:absolute;top:20px;right:var(--pad);
  display:flex;align-items:center;gap:24px;
  font-family:var(--mono);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--dim);
}
.lb-close{cursor:pointer;color:var(--fg);transition:opacity .3s}
.lb-close:hover{opacity:.6}
.lb-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  display:flex;width:100%;justify-content:space-between;
  padding:0 20px;pointer-events:none;
}
.lb-btn{
  pointer-events:all;cursor:pointer;
  width:44px;height:44px;display:grid;place-items:center;
  border:1px solid var(--line);background:transparent;color:var(--fg);
  font-family:var(--mono);font-size:16px;
  transition:all .3s;
}
.lb-btn:hover{background:var(--fg);color:var(--bg)}
.lb-counter{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);
}
.lb-place{
  position:absolute;bottom:24px;left:var(--pad);
  font-family:var(--sans);font-weight:200;font-size:13px;color:var(--dim);
}

/* ── about strip ───────────────────────────── */
.about-strip{
  padding:80px var(--pad) 100px;
  display:grid;grid-template-columns:1fr 1fr;gap:80px;
  border-top:1px solid var(--line);align-items:start;
}
.about-strip .series-q{
  font-family:var(--sans);font-weight:100;
  font-size:clamp(30px,3.5vw,54px);line-height:1.12;
  letter-spacing:.06em;text-transform:uppercase;
}
.about-strip .series-txt{
  font-family:var(--mono);font-size:12px;line-height:1.82;color:var(--dim);
}
.about-strip .series-txt p+p{margin-top:14px}

/* ── footer ────────────────────────────────── */
footer{
  padding:28px var(--pad);border-top:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
  font-family:var(--mono);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--dim);
}
footer .next-series{
  display:flex;align-items:center;gap:10px;
  color:var(--fg);transition:gap .4s;font-size:9px;letter-spacing:.24em;text-transform:uppercase;
}
footer .next-series:hover{gap:18px}

/* mobile */
@media(max-width:760px){
  .gallery{columns:2}
  .sh-content{flex-direction:column;align-items:flex-start;gap:20px}
  .sh-right{text-align:left}
  .about-strip{grid-template-columns:1fr;gap:32px;padding:60px 20px}
  footer{flex-direction:column;gap:16px;align-items:flex-start;padding:24px 20px}
}
@media(max-width:480px){.gallery{columns:1}}
</style>
</head>
<body>

<div class="cur-dot" id="cur-dot"></div>
<div class="cur-ring" id="cur-ring"></div>

<!-- lightbox -->
<div class="lb" id="lb" role="dialog" aria-modal="true">
  <div class="lb-ctrl">
    <span id="lb-counter-top" class="lb-counter" style="position:static;transform:none"></span>
    <span class="lb-close" id="lb-close">&#x2715; Close</span>
  </div>
  <div class="lb-nav">
    <button class="lb-btn" id="lb-prev">&#8592;</button>
    <button class="lb-btn" id="lb-next">&#8594;</button>
  </div>
  <img class="lb-img" id="lb-img" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" alt="" />
  <div class="lb-place" id="lb-place"></div>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<!-- nav -->
<nav class="nav">
  <a href="index.html" class="back">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>
  <span class="brand">Interlude</span>
  <span class="meta">
    <span class="series-title" id="nav-brand"></span>
    <span class="count" id="nav-count"></span>
  </span>
</nav>

<!-- header -->
<header class="series-header" id="series-header">
  <div class="sh-cover" id="sh-cover"></div>
  <div class="sh-shade"></div>
  <div class="sh-content">
    <div class="sh-left">
      <div class="sh-num" id="sh-num"></div>
      <h1 id="sh-title"></h1>
    </div>
    <div class="sh-right" id="sh-right"></div>
  </div>
</header>

<!-- meta bar -->
<div class="meta-bar">
  <span id="meta-loc"></span>
  <div class="prog">
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <span id="meta-count"></span>
  </div>
</div>

<!-- gallery -->
<div class="gallery" id="gallery"></div>

<!-- about strip -->
<div class="about-strip" id="about-strip">
  <div class="series-q" id="series-q"></div>
  <div class="series-txt" id="series-txt"></div>
</div>

<!-- footer -->
<footer>
  <span style="color:var(--dim)">&copy; Clément Hirson &mdash; 2019 / 2026</span>
  <a class="next-series" id="next-link" href="#">
    Next series &rarr;
  </a>
</footer>

<script>
/* ── helpers ─────────────────────────────────── */
function optBase(src) {
  return src.replace('uploads/', 'uploads/opt/').replace(/\.jpg$/i, '');
}
function picHTML(src, alt, sizes, extra='') {
  const b = optBase(src);
  return `<picture>
    <source srcset="${b}-900.avif 900w, ${b}-1920.avif 1920w" type="image/avif" sizes="${sizes}">
    <source srcset="${b}-900.jpg 900w, ${b}-1920.jpg 1920w" type="image/jpeg" sizes="${sizes}">
    <img src="${b}-1920.jpg" alt="${alt}" ${extra}>
  </picture>`;
}

/* ── build page from data ────────────────────── */
function buildPage(allSeries) {
  const key = (new URLSearchParams(location.search).get('s') || Object.keys(allSeries)[0]).toLowerCase();
  const raw = allSeries[key] || allSeries[Object.keys(allSeries)[0]];

  /* normalise photos: data.json uses {file} → build {src} */
  const photos = raw.photos.map(p => ({
    src:   'uploads/' + p.file,
    place: p.place,
    code:  p.code
  }));
  const coverSrc = 'uploads/' + raw.cover;
  const nextKey  = raw.next;
  const nextSerie = allSeries[nextKey];

  /* header + SEO */
  const seriesUrl = 'https://www.lenstraveler.fr/series.html?s=' + key;
  const coverAbs  = 'https://www.lenstraveler.fr/uploads/opt/' + raw.cover.replace(/\.(jpe?g|png)$/i,'') + '-1920.jpg';
  const seriesDesc = `${raw.title} — a documentary photography series by Clément Hirson. ${photos.length} frames from ${raw.loc}.`;
  document.title = 'Interlude — ' + raw.title;
  document.querySelector('meta[name="description"]').setAttribute('content', seriesDesc);
  document.querySelector('link[rel="canonical"]').setAttribute('href', seriesUrl);
  const setMeta = (selector, value) => { const el = document.querySelector(selector); if (el) el.setAttribute('content', value); };
  setMeta('meta[property="og:title"]',       'Interlude — ' + raw.title);
  setMeta('meta[property="og:description"]', seriesDesc);
  setMeta('meta[property="og:url"]',         seriesUrl);
  setMeta('meta[property="og:image"]',       coverAbs);
  setMeta('meta[name="twitter:title"]',      'Interlude — ' + raw.title);
  setMeta('meta[name="twitter:description"]',seriesDesc);
  setMeta('meta[name="twitter:image"]',      coverAbs);
  /* JSON-LD ImageGallery */
  const ld = document.createElement('script');
  ld.type = 'application/ld+json';
  ld.textContent = JSON.stringify({
    "@context":"https://schema.org",
    "@type":"ImageGallery",
    "name": 'Interlude — ' + raw.title,
    "description": seriesDesc,
    "url": seriesUrl,
    "image": coverAbs,
    "author": { "@type":"Person", "name":"Clément Hirson", "url":"https://www.lenstraveler.fr/" },
    "numberOfItems": photos.length
  });
  document.head.appendChild(ld);
  document.getElementById('nav-brand').textContent  = raw.title;
  document.getElementById('nav-count').textContent  = photos.length + ' photographs';
  document.getElementById('sh-cover').innerHTML     = picHTML(coverSrc, raw.title, '100vw');
  document.getElementById('sh-num').textContent     = raw.num;
  document.getElementById('sh-title').textContent   = raw.title;
  document.getElementById('sh-right').innerHTML     = raw.right + '<br/>' + photos.length + ' photographs';
  document.getElementById('meta-loc').textContent   = raw.loc;
  document.getElementById('meta-count').textContent = photos.length + ' frames';
  document.getElementById('series-q').innerHTML     = raw.q;
  document.getElementById('series-txt').innerHTML   = raw.txt;
  const nl = document.getElementById('next-link');
  if (nextSerie) {
    nl.textContent = 'Next — ' + nextSerie.title + ' →';
    nl.href = 'series.html?s=' + nextKey;
  }

  /* gallery */
  const gallery  = document.getElementById('gallery');
  const progFill = document.getElementById('prog-fill');
  const SIZES_GALLERY = '(max-width:480px) 100vw, (max-width:760px) 50vw, 33vw';

  photos.forEach((p,i)=>{
    const fig = document.createElement('figure');
    fig.className='gitem';
    fig.dataset.idx = i;
    fig.innerHTML = picHTML(p.src, p.place, SIZES_GALLERY, i<6?'':'loading="lazy"')
      + `<figcaption class="gitem-cap">
        <span class="place">${p.place}</span>
        <span class="code">${p.code}</span>
      </figcaption>`;
    fig.addEventListener('click',()=>openLb(i));
    gallery.appendChild(fig);
  });

  /* reveal */
  const io = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); }
    });
  },{threshold:.06});
  document.querySelectorAll('.gitem').forEach((el,i)=>{
    el.style.transitionDelay = Math.min(i%4,3)*80+'ms';
    io.observe(el);
  });

  /* progress bar */
  window.addEventListener('scroll',()=>{
    const rect = gallery.getBoundingClientRect();
    const pct = Math.min(100, Math.max(0, (-rect.top / gallery.offsetHeight)*100));
    progFill.style.width = pct+'%';
  },{passive:true});

  /* lightbox */
  const lb = document.getElementById('lb');
  const lbImg = document.getElementById('lb-img');
  const lbPlace = document.getElementById('lb-place');
  const lbCounter = document.getElementById('lb-counter');
  const lbCounterTop = document.getElementById('lb-counter-top');
  let lbIdx = 0;

  function openLb(i){ lbIdx=i; showLb(); lb.classList.add('open'); document.body.style.overflow='hidden'; }
  function showLb(){
    const p = photos[lbIdx];
    lbImg.src = optBase(p.src)+'-1920.jpg';
    lbImg.alt = p.place;
    lbPlace.textContent = p.place;
    const c = (lbIdx+1)+' / '+photos.length;
    lbCounter.textContent = lbCounterTop.textContent = c;
  }
  function closeLb(){ lb.classList.remove('open'); document.body.style.overflow=''; }

  document.getElementById('lb-close').addEventListener('click', closeLb);
  document.getElementById('lb-prev').addEventListener('click', ()=>{ lbIdx=(lbIdx-1+photos.length)%photos.length; showLb(); });
  document.getElementById('lb-next').addEventListener('click', ()=>{ lbIdx=(lbIdx+1)%photos.length; showLb(); });
  lb.addEventListener('click', e=>{ if(e.target===lb) closeLb(); });
  document.addEventListener('keydown', e=>{
    if(!lb.classList.contains('open')) return;
    if(e.key==='Escape') closeLb();
    if(e.key==='ArrowLeft')  { lbIdx=(lbIdx-1+photos.length)%photos.length; showLb(); }
    if(e.key==='ArrowRight') { lbIdx=(lbIdx+1)%photos.length; showLb(); }
  });

  /* swipe */
  let ts=0,tx=0;
  lb.addEventListener('touchstart',e=>{ ts=Date.now(); tx=e.touches[0].clientX; },{passive:true});
  lb.addEventListener('touchend',e=>{
    if(Date.now()-ts>300) return;
    const dx=e.changedTouches[0].clientX-tx;
    if(Math.abs(dx)<40) return;
    lbIdx = dx<0 ? (lbIdx+1)%photos.length : (lbIdx-1+photos.length)%photos.length;
    showLb();
  });

  /* cursor hover on gallery items */
  document.querySelectorAll('.gitem,a,button').forEach(el=>{
    el.addEventListener('mouseenter',()=>document.body.classList.add('chover'));
    el.addEventListener('mouseleave',()=>document.body.classList.remove('chover'));
  });
}

/* ── fetch data.json and init ────────────────── */
fetch('data.json')
  .then(r => r.json())
  .then(data => buildPage(data.series))
  .catch(() => console.error('Impossible de charger data.json'));

/* ── cursor ──────────────────────────────────── */
const dot=document.getElementById('cur-dot');
const ring=document.getElementById('cur-ring');
if(!matchMedia('(pointer:coarse)').matches){
  let mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my;
  addEventListener('mousemove',e=>{ mx=e.clientX; my=e.clientY; dot.style.left=mx+'px'; dot.style.top=my+'px'; });
  (function tick(){ rx+=(mx-rx)*.12; ry+=(my-ry)*.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(tick); })();
}

/* ── load ────────────────────────────────────── */
window.addEventListener('load',()=>document.body.classList.add('loaded'));
</script>
</body>
</html>
